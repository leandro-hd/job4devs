services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: job4devs
    ports:
      - "5432:5432"
    volumes:
      - job4devs_postgres_data:/var/lib/postgresql/data

volumes:
  job4devs_postgres_data:
